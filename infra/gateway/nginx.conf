worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":"$status",'
      '"request_time":"$request_time",'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_response_time":"$upstream_response_time",'
      '"remote_addr":"$remote_addr",'
      '"http_user_agent":"$http_user_agent"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  keepalive_timeout 65;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

  # ── Upstream services ──────────────────────────────────────────────────────
  upstream auth_service {
    server auth-service:3001;
    keepalive 32;
  }

  upstream users_service {
    server users-service:3002;
    keepalive 32;
  }

  upstream bookings_service {
    server bookings-service:3003;
    keepalive 32;
  }

  upstream notifications_service {
    server notifications-service:3004;
    keepalive 32;
  }

  upstream payments_service {
    server payments-service:3005;
    keepalive 32;
  }

  upstream admin_service {
    server admin-service:3006;
    keepalive 32;
  }

  # ── Shared proxy headers ───────────────────────────────────────────────────
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  server {
    listen 80;
    server_name _;

    # Health endpoint
    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # ── Auth Service ─────────────────────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://auth_service;
    }

    # ── Users Service ────────────────────────────────────────────────────
    location /api/v1/profiles/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://users_service;
    }

    location /api/v1/clinics/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://users_service;
    }

    location /api/v1/documents/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://users_service;
      # Allow larger uploads (document files)
      client_max_body_size 20m;
    }

    # ── Bookings Service ─────────────────────────────────────────────────
    location /api/v1/shifts/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://bookings_service;
    }

    location /api/v1/bookings/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://bookings_service;
    }

    # ── Notifications Service ────────────────────────────────────────────
    location /api/v1/notifications/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://notifications_service;
    }

    # ── Payments Service ─────────────────────────────────────────────────
    location /api/v1/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://payments_service;
    }

    # Stripe webhooks — no rate limit, needs raw body
    location /api/v1/webhooks/ {
      proxy_pass http://payments_service;
      proxy_buffering off;
    }

    # ── Admin Service ────────────────────────────────────────────────────
    location /api/v1/admin/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://admin_service;
    }

    # ── API docs (passthrough per service) ───────────────────────────────
    location /api/docs/auth {
      proxy_pass http://auth_service/api/docs;
    }
    location /api/docs/users {
      proxy_pass http://users_service/api/docs;
    }
    location /api/docs/bookings {
      proxy_pass http://bookings_service/api/docs;
    }
    location /api/docs/payments {
      proxy_pass http://payments_service/api/docs;
    }

    # Default — 404
    location / {
      return 404 '{"error":"Not found"}';
      add_header Content-Type application/json;
    }
  }
}
