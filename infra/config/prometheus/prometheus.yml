global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'syndeocare'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/api/v1/metrics'

  - job_name: 'users-service'
    static_configs:
      - targets: ['users-service:3002']
    metrics_path: '/api/v1/metrics'

  - job_name: 'bookings-service'
    static_configs:
      - targets: ['bookings-service:3003']
    metrics_path: '/api/v1/metrics'

  - job_name: 'notifications-service'
    static_configs:
      - targets: ['notifications-service:3004']
    metrics_path: '/api/v1/metrics'

  - job_name: 'payments-service'
    static_configs:
      - targets: ['payments-service:3005']
    metrics_path: '/api/v1/metrics'

  - job_name: 'admin-service'
    static_configs:
      - targets: ['admin-service:3006']
    metrics_path: '/api/v1/metrics'
