# SyndeoCare – Self-Hosted Docker Compose Stack
#
# Includes:
#   • Full Supabase stack  (db, auth, rest, realtime, storage, meta, functions)
#   • Kong API gateway     (port 8000)
#   • Supabase Studio      (port 3000)
#   • SyndeoCare frontend  (port 80)
#
# Quick start:
#   1. cp .env.example .env  &&  edit .env
#   2. docker compose up -d
#   3. Open http://localhost (frontend) or http://localhost:3000 (Studio)
#
# ⚠ Change ALL secrets in .env before exposing this stack to the internet.

x-supabase-env: &supabase-env
  POSTGRES_HOST: db
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

services:

  ###############################################################################
  # PostgreSQL
  ###############################################################################
  db:
    image: supabase/postgres:15.8.1.073
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST_AUTH_METHOD: md5
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/volumes/db/init:/docker-entrypoint-initdb.d:ro
      # Mount migrations so they are applied on first boot
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - supabase-network
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c log_min_messages=fatal

  ###############################################################################
  # Kong API Gateway
  ###############################################################################
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: "request-transformer,cors,key-auth,acl,basic-auth"
      KONG_STATUS_LISTEN: "0.0.0.0:8001"
      KONG_NGINX_PROXY_SET: "$$upstream_keepalive_max_requests 0"
      SUPABASE_ANON_KEY: ${ANON_KEY:?ANON_KEY is required}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY:?SERVICE_ROLE_KEY is required}
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-8443}:8443/tcp"
    volumes:
      - ./docker/volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - supabase-network
    # Substitute env vars in the kong.yml at startup
    entrypoint: >
      sh -c "
        export ANON_KEY='${ANON_KEY}'
        export SERVICE_ROLE_KEY='${SERVICE_ROLE_KEY}'
        envsubst '\$ANON_KEY \$SERVICE_ROLE_KEY' < /var/lib/kong/kong.yml > /tmp/kong-rendered.yml
        KONG_DECLARATIVE_CONFIG=/tmp/kong-rendered.yml kong docker-start
      "

  ###############################################################################
  # GoTrue – Auth
  ###############################################################################
  auth:
    image: supabase/gotrue:v2.174.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      <<: *supabase-env
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?search_path=auth&sslmode=disable
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@syndeocare.ai}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-SyndeoCare}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "true"
    networks:
      - supabase-network

  ###############################################################################
  # PostgREST – REST API
  ###############################################################################
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    networks:
      - supabase-network
    command: "postgrest"

  ###############################################################################
  # Supabase Realtime
  ###############################################################################
  realtime:
    image: supabase/realtime:v2.34.47
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "-H", "Authorization: Bearer ${ANON_KEY}", "http://localhost:4000/api/tenants/realtime-dev/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
    networks:
      - supabase-network
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"

  ###############################################################################
  # Supabase Storage
  ###############################################################################
  storage:
    image: supabase/storage-api:v1.22.8
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage
    networks:
      - supabase-network

  ###############################################################################
  # imgproxy – image transformations for Storage
  ###############################################################################
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro
    networks:
      - supabase-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###############################################################################
  # pg-meta – Postgres metadata API (used by Studio)
  ###############################################################################
  meta:
    image: supabase/postgres-meta:v0.87.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - supabase-network

  ###############################################################################
  # Supabase Edge Runtime – Deno edge functions
  ###############################################################################
  functions:
    image: supabase/edge-runtime:v1.67.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      # Email provider
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      APP_URL: ${SITE_URL:-http://localhost}
      # Allow functions to reach external services
      DENO_ALLOW_NET: "*"
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    networks:
      - supabase-network
    command:
      - start
      - --main-service
      - /home/deno/functions

  ###############################################################################
  # Supabase Studio
  ###############################################################################
  studio:
    image: supabase/studio:20250317-6955350
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/profile', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-SyndeoCare}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-SyndeoCare}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-super-secret-and-long-logflare-key}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    networks:
      - supabase-network

  ###############################################################################
  # SyndeoCare Frontend
  ###############################################################################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_started
    environment:
      # These are injected at container start by docker/entrypoint.sh
      VITE_SUPABASE_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - supabase-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

###############################################################################
# Volumes & Networks
###############################################################################
volumes:
  db-data:
  storage-data:

networks:
  supabase-network:
    driver: bridge
