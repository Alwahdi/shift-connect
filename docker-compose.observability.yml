# SyndeoCare — Observability Stack
# ──────────────────────────────────
# Optional add-on to the microservices compose.
# Run with:
#   docker compose -f docker-compose.microservices.yml \
#                  -f docker-compose.observability.yml \
#                  --env-file .env.microservices up -d
#
# Access:
#   Grafana:    http://localhost:3100  (admin / ${GRAFANA_PASSWORD:-admin})
#   Prometheus: http://localhost:9090
#   Loki:       internal only (queried via Grafana)

services:

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./infra/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - syndeocare-network

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/config/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - syndeocare-network

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./infra/config/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      - syndeocare-network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - syndeocare-network

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  syndeocare-network:
    external: true
