# SyndeoCare — Microservices Docker Compose Stack
# ─────────────────────────────────────────────────
# Quick start:
#   1. cp .env.microservices.example .env.microservices
#   2. Edit .env.microservices (fill in secrets)
#   3. docker compose -f docker-compose.microservices.yml --env-file .env.microservices up -d
#
# Ports (host → container):
#   80    → frontend (nginx)
#   8080  → API gateway (nginx)
#   3001  → auth-service
#   3002  → users-service
#   3003  → bookings-service
#   3004  → notifications-service
#   3005  → payments-service
#   3006  → admin-service
#   5432  → postgres
#   6379  → redis
#   9092  → kafka
#   9001  → minio console
#   9000  → minio API
#   8090  → kafka-ui
#
# Observability (optional – see docker-compose.observability.yml):
#   3000  → grafana
#   9090  → prometheus

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - syndeocare-network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Shared env vars for all NestJS services (no DATABASE_URL — each service has its own)
x-nestjs-env: &nestjs-env
  NODE_ENV: ${NODE_ENV:-development}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  KAFKA_BROKERS: kafka:9092
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

# ── Per-service database credentials (isolated databases, same Postgres instance) ──
x-db-creds: &db-creds
  POSTGRES_USER: ${POSTGRES_USER:-syndeocare}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  POSTGRES_HOST: postgres

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────

  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      # The default database is used only as a superuser connection target during init.
      # Service databases (auth_db, users_db, etc.) are created by init.sh.
      POSTGRES_DB: ${POSTGRES_DB:-syndeocare}
      POSTGRES_USER: ${POSTGRES_USER:-syndeocare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/config/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-syndeocare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      sh -c "
        if [ -n '${REDIS_PASSWORD:-}' ]; then
          redis-server --requirepass '${REDIS_PASSWORD}'
        else
          redis-server
        fi
      "
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    <<: *service-defaults
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    <<: *service-defaults
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"

  # Creates all Kafka topics required by the services.
  # Runs once at startup; fails fast if Kafka is unreachable.
  kafka-init:
    <<: *service-defaults
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.auth.user-registered.v1     --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.auth.otp-requested.v1       --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.bookings.booking-created.v1  --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.bookings.booking-status-changed.v1 --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.payments.payment-completed.v1 --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.payments.payment-failed.v1    --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.notifications.email-send.v1  --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.auth.dead-letter             --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.bookings.dead-letter          --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.payments.dead-letter          --partitions 1 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syndeocare.notifications.dead-letter     --partitions 1 --replication-factor 1 &&
        echo 'All Kafka topics created.'
      "
    restart: "no"

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer
  minio-init:
    <<: *service-defaults
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/${S3_BUCKET_NAME:-syndeocare} &&
        mc anonymous set download myminio/${S3_BUCKET_NAME:-syndeocare}/public &&
        echo 'MinIO bucket ready'
      "
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # NestJS Microservices
  # ─────────────────────────────────────────────────────────────────────────

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *nestjs-env
      PORT: 3001
      KAFKA_CLIENT_ID: auth-service
      # auth-service owns auth_db — isolated from all other services
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/auth_db
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-300}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  users-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      <<: *nestjs-env
      PORT: 3002
      KAFKA_CLIENT_ID: users-service
      # users-service owns users_db — isolated from all other services
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/users_db
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-syndeocare}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  bookings-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/bookings-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *nestjs-env
      PORT: 3003
      KAFKA_CLIENT_ID: bookings-service
      # bookings-service owns bookings_db — isolated from all other services
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/bookings_db
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notifications-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *nestjs-env
      PORT: 3004
      KAFKA_CLIENT_ID: notifications-service
      # notifications-service owns notifications_db — isolated from all other services
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/notifications_db
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  payments-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/payments-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *nestjs-env
      PORT: 3005
      KAFKA_CLIENT_ID: payments-service
      # payments-service owns payments_db — isolated from all other services
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/payments_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3005:3005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *nestjs-env
      PORT: 3006
      KAFKA_CLIENT_ID: admin-service
      # admin-service owns admin_db — admin reads aggregated data via service APIs, NOT direct DB access
      DATABASE_URL: postgres://${POSTGRES_USER:-syndeocare}:${POSTGRES_PASSWORD}@postgres:5432/admin_db
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/api/v1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # API Gateway (nginx)
  # ─────────────────────────────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    image: nginx:1.27-alpine
    depends_on:
      - auth-service
      - users-service
      - bookings-service
      - notifications-service
      - payments-service
      - admin-service
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────

  frontend:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    environment:
      # API gateway URL consumed by the frontend. Override to point to a custom domain.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-80}:80"

# ─────────────────────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────────────────────

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zookeeper-data:
  zookeeper-logs:
  minio-data:

networks:
  syndeocare-network:
    driver: bridge
